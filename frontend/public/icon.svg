<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo verde institucional UNIFESP -->
  <rect width="32" height="32" rx="6" fill="#085738"/>

  <!-- Pedimento triangular (telhado do prédio) -->
  <path d="M4.5 13 L16 5 L27.5 13 Z" fill="white"/>

  <!-- Friso horizontal (entablamento) -->
  <rect x="4.5" y="13" width="23" height="2.5" fill="white" rx="0.5"/>

  <!-- Quatro colunas -->
  <rect x="6.5"  y="15.5" width="3"   height="10" fill="white" rx="0.5"/>
  <rect x="11.5" y="15.5" width="3"   height="10" fill="white" rx="0.5"/>
  <rect x="16.5" y="15.5" width="3"   height="10" fill="white" rx="0.5"/>
  <rect x="21.5" y="15.5" width="3"   height="10" fill="white" rx="0.5"/>

  <!-- Degrau base (estilóbata) -->
  <rect x="3.5" y="25.5" width="25" height="3" fill="white" rx="0.5"/>
</svg>
